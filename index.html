<!DOCTYPE html>
<html lang="te" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arpana Hosanna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu:wght@300;400;600;700&family=Noto+Sans+Telugu:wght@300;400;600&family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* ═══ THEME TOKENS — Multi-Colored Glassmorphism ═══ */
        :root {
            /* Glassmorphism base */
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --glass-blur: blur(16px);

            /* Dark theme defaults */
            --bg-primary: #0a0618;
            --bg-secondary: #110b24;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #f0ecfa;
            --text-secondary: #c4b8e0;
            --text-muted: #7a6a9e;
            --border-color: rgba(255, 255, 255, 0.08);

            /* Multi-color palette */
            --color-purple: #7c3aed;
            --color-purple-light: #a855f7;
            --color-purple-glow: rgba(124, 58, 237, 0.3);
            --color-gold: #d4a843;
            --color-gold-light: #f0c96a;
            --color-gold-glow: rgba(212, 168, 67, 0.25);
            --color-teal: #14b8a6;
            --color-teal-glow: rgba(20, 184, 166, 0.2);
            --color-pink: #ec4899;
            --color-pink-glow: rgba(236, 72, 153, 0.2);
            --color-blue: #3b82f6;
            --color-blue-glow: rgba(59, 130, 246, 0.2);

            /* Gradients */
            --gradient-hero: linear-gradient(135deg, rgba(124, 58, 237, 0.3) 0%, rgba(212, 168, 67, 0.15) 50%, rgba(236, 72, 153, 0.1) 100%);
            --gradient-card: linear-gradient(135deg, rgba(124, 58, 237, 0.08), rgba(20, 184, 166, 0.05));
            --gradient-glow: linear-gradient(135deg, var(--color-purple), var(--color-gold), var(--color-teal));

            /* Transitions */
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);

            /* Sizes */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        /* Light Theme */
        [data-theme="light"] {
            --bg-primary: #f5f0ff;
            --bg-secondary: #ede6ff;
            --bg-card: rgba(255, 255, 255, 0.6);
            --text-primary: #1a1430;
            --text-secondary: #4a3a70;
            --text-muted: #8a7aaa;
            --border-color: rgba(124, 58, 237, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(124, 58, 237, 0.15);
            --glass-shadow: 0 8px 32px rgba(124, 58, 237, 0.08);
        }

        /* ═══ RESET & BASE ═══ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition-smooth), color var(--transition-smooth);
            line-height: 1.6;
        }

        /* ═══ GLASS BACKGROUND EFFECT ═══ */
        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-glow .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .bg-glow .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -10%;
            left: -10%;
            background: var(--color-purple);
            animation-delay: 0s;
        }
        .bg-glow .orb:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -10%;
            right: -10%;
            background: var(--color-gold);
            animation-delay: -7s;
        }
        .bg-glow .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--color-teal);
            animation-delay: -14s;
            opacity: 0.15;
        }
        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(60px, -40px) scale(1.1);
            }
            66% {
                transform: translate(-30px, 50px) scale(0.9);
            }
            100% {
                transform: translate(40px, -20px) scale(1.05);
            }
        }

        /* ═══ PARTICLE CANVAS (subtle) ═══ */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ═══ MAGIC CIRCLE (decorative) ═══ */
        .magic-circle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            animation: magicSpin 60s linear infinite;
        }
        @keyframes magicSpin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ═══ GLASS HEADER ═══ */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 20px;
            transition: background var(--transition-smooth);
        }
        [data-theme="light"] header {
            background: rgba(255, 255, 255, 0.7);
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            min-height: 64px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 20px var(--color-purple-glow);
        }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-gold-light), var(--color-purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        .logo-sub {
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            -webkit-text-fill-color: var(--text-muted);
        }
        .header-center {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .lang-toggle {
            display: flex;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3px;
            gap: 2px;
            backdrop-filter: var(--glass-blur);
        }
        .lang-btn {
            padding: 5px 14px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: all var(--transition-smooth);
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, var(--color-purple), var(--color-purple-light));
            color: #fff;
            box-shadow: 0 2px 16px var(--color-purple-glow);
        }
        .lang-btn:hover:not(.active) {
            color: var(--text-primary);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .stat-pill {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            backdrop-filter: var(--glass-blur);
        }
        .stat-pill span {
            background: linear-gradient(135deg, var(--color-gold-light), var(--color-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        .theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all var(--transition-smooth);
            color: var(--text-primary);
            backdrop-filter: var(--glass-blur);
        }
        .theme-btn:hover {
            border-color: var(--color-purple);
            box-shadow: 0 0 20px var(--color-purple-glow);
            transform: scale(1.05);
        }

        /* ═══ HERO — Glassmorphism ═══ */
        .hero {
            position: relative;
            overflow: hidden;
            padding: 50px 20px 40px;
            text-align: center;
            background: var(--gradient-hero);
            border-bottom: 1px solid var(--glass-border);
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 80%, var(--color-purple-glow) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0.3;
        }
        .hero-logo-img {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-md);
            object-fit: cover;
            border: 2px solid var(--glass-border);
            box-shadow: 0 0 40px var(--color-purple-glow), 0 0 80px rgba(124, 58, 237, 0.05);
            margin: 0 auto 14px;
            display: block;
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.6s ease both;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-gold);
            margin-bottom: 12px;
            backdrop-filter: var(--glass-blur);
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.6s ease 0.1s both;
        }
        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-gold-light), var(--color-purple-light), var(--color-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.15;
            margin-bottom: 2px;
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.7s ease 0.2s both;
            text-shadow: 0 0 60px var(--color-gold-glow);
        }
        .hero-subtitle {
            font-family: 'Noto Serif Telugu', serif;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--text-secondary);
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.7s ease 0.3s both;
        }
        .hero-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.7s ease 0.4s both;
        }
        .hero-desc span {
            background: linear-gradient(135deg, var(--color-teal), var(--color-purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }
        .hero-divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
            margin: 16px auto;
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.7s ease 0.5s both;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ═══ CONTROLS — Glass ═══ */
        .controls {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeSlideUp 0.8s ease 0.6s both;
        }
        .search-wrap {
            position: relative;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 18px;
            height: 18px;
        }
        #search {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 13px 16px 13px 44px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all var(--transition-smooth);
            font-family: 'Inter', sans-serif;
            backdrop-filter: var(--glass-blur);
        }
        #search:focus {
            border-color: var(--color-purple);
            box-shadow: 0 0 0 3px var(--color-purple-glow), 0 0 30px var(--color-purple-glow);
        }
        #search::placeholder {
            color: var(--text-muted);
        }
        .filter-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 6px 14px;
            color: var(--text-muted);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all var(--transition-smooth);
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
            backdrop-filter: var(--glass-blur);
        }
        .filter-btn:hover {
            border-color: var(--color-purple-light);
            color: var(--text-primary);
            transform: translateY(-1px);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.25), rgba(168, 85, 247, 0.15));
            border-color: var(--color-purple);
            color: var(--color-purple-light);
            box-shadow: 0 0 20px var(--color-purple-glow);
        }
        .sort-select {
            margin-left: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 6px 14px;
            color: var(--text-muted);
            font-size: 0.72rem;
            cursor: pointer;
            outline: none;
            font-family: 'Inter', sans-serif;
            backdrop-filter: var(--glass-blur);
            transition: border-color var(--transition-smooth);
        }
        .sort-select:hover,
        .sort-select:focus {
            border-color: var(--color-purple-light);
        }

        /* ═══ LETTER FILTER ═══ */
        .letter-filter-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .letter-filter-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .letter-filter-title {
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .letter-filter-clear {
            font-size: 0.6rem;
            color: var(--color-purple-light);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 3px;
            display: none;
            font-family: 'Inter', sans-serif;
        }
        .letter-filter-clear.visible {
            display: inline;
        }
        .letters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .letter-btn {
            min-width: 32px;
            height: 32px;
            padding: 0 6px;
            border-radius: var(--radius-sm);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all var(--transition-smooth);
            font-family: 'Noto Sans Telugu', 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: var(--glass-blur);
        }
        .letter-btn:hover {
            border-color: var(--color-gold);
            color: var(--color-gold);
            transform: translateY(-2px);
        }
        .letter-btn.active {
            background: linear-gradient(135deg, rgba(212, 168, 67, 0.2), rgba(240, 201, 106, 0.1));
            border-color: var(--color-gold);
            color: var(--color-gold-light);
            box-shadow: 0 0 20px var(--color-gold-glow);
        }
        .letter-btn.disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        /* ═══ RESULTS BAR ═══ */
        .results-bar {
            max-width: 1200px;
            margin: 12px auto 0;
            padding: 0 20px;
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .results-count {
            background: linear-gradient(135deg, var(--color-gold-light), var(--color-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        .loading-indicator {
            display: none;
            font-size: 0.7rem;
            color: var(--color-gold);
            animation: pulse 1.2s infinite;
        }
        .loading-indicator.active {
            display: inline-block;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        /* ═══ SONGS GRID — Glass Cards ═══ */
        .songs-grid {
            max-width: 1280px;
            margin: 14px auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        /* ═══ SONG CARD — Glassmorphism ═══ */
        .song-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-bounce);
            animation: cardIn 0.5s ease both;
            box-shadow: var(--glass-shadow);
        }
        .song-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-md);
            padding: 1px;
            background: linear-gradient(135deg, var(--color-purple), var(--color-gold), var(--color-teal), var(--color-pink));
            opacity: 0;
            transition: opacity var(--transition-smooth);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .song-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-md);
            background: radial-gradient(ellipse at var(--mx, 50%) var(--my, 50%), rgba(124, 58, 237, 0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity var(--transition-smooth);
            pointer-events: none;
        }
        .song-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(124, 58, 237, 0.2);
        }
        .song-card:hover::before {
            opacity: 1;
        }
        .song-card:hover::after {
            opacity: 1;
        }
        .song-card.is-new::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-purple-light);
            animation: glowPulse 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 10px var(--color-purple-glow);
            }
            50% {
                box-shadow: 0 0 30px var(--color-purple-glow);
            }
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .song-num {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-bottom: 2px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
            font-weight: 500;
        }
        .song-title-primary {
            font-family: 'Noto Serif Telugu', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 1px;
        }
        .song-title-secondary {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        [data-lang="en"] .song-title-primary {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }
        [data-lang="en"] .song-title-secondary {
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 0.8rem;
        }
        .song-preview {
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-style: italic;
            opacity: 0.8;
        }
        [data-lang="en"] .song-preview {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
        }
        .song-meta {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tag {
            font-size: 0.55rem;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .tag-scale {
            background: rgba(212, 168, 67, 0.15);
            color: var(--color-gold);
            border: 1px solid rgba(212, 168, 67, 0.2);
        }
        .tag-new {
            background: rgba(124, 58, 237, 0.2);
            color: var(--color-purple-light);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        .tag-cat {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
        }
        .song-links {
            margin-left: auto;
            display: flex;
            gap: 4px;
        }
        .icon-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            transition: all var(--transition-smooth);
            flex-shrink: 0;
            backdrop-filter: var(--glass-blur);
            font-size: 0;
        }
        .icon-btn:hover {
            background: var(--color-purple-glow);
            border-color: var(--color-purple);
            color: var(--color-purple-light);
            transform: scale(1.1);
        }
        .icon-btn svg {
            width: 12px;
            height: 12px;
        }

        /* ═══ NOW PLAYING BAR — Glass ═══ */
        .now-playing {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--glass-border);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100%);
            transition: transform var(--transition-bounce);
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.2);
        }
        .now-playing.visible {
            transform: translateY(0);
        }
        [data-theme="light"] .now-playing {
            background: rgba(255, 255, 255, 0.8);
        }
        .np-info {
            flex: 1;
            min-width: 0;
        }
        .np-title {
            font-size: 0.78rem;
            font-family: 'Noto Serif Telugu', serif;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .np-sub {
            font-size: 0.6rem;
            color: var(--text-muted);
        }
        .np-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .np-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-smooth);
            font-size: 0.7rem;
            font-weight: 600;
            backdrop-filter: var(--glass-blur);
        }
        .np-btn:hover {
            border-color: var(--color-purple-light);
            color: var(--color-purple-light);
            transform: scale(1.05);
        }
        .np-btn.play {
            background: linear-gradient(135deg, var(--color-purple), var(--color-purple-light));
            border-color: transparent;
            color: #fff;
            width: 40px;
            height: 40px;
            font-size: 0.9rem;
            box-shadow: 0 2px 20px var(--color-purple-glow);
        }
        .np-btn.play:hover {
            box-shadow: 0 4px 32px var(--color-purple-glow);
            transform: scale(1.08);
        }
        .np-progress-wrap {
            flex: 2;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .np-progress {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        [data-theme="light"] .np-progress {
            background: rgba(0, 0, 0, 0.08);
        }
        .np-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-purple), var(--color-gold), var(--color-teal));
            border-radius: 2px;
            transition: width 0.1s;
            width: 0%;
        }
        .np-time {
            display: flex;
            justify-content: space-between;
            font-size: 0.55rem;
            color: var(--text-muted);
        }
        .np-close {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: color var(--transition-smooth);
        }
        .np-close:hover {
            color: var(--text-primary);
        }
        audio#audio-player {
            display: none;
        }

        /* ═══ MODAL — Glass ═══ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            max-width: 780px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(30px) scale(0.96);
            transition: transform var(--transition-bounce);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .modal-overlay.open .modal {
            transform: translateY(0) scale(1);
        }
        .modal-header {
            padding: 22px 24px 16px;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            background: linear-gradient(180deg, rgba(124, 58, 237, 0.08), transparent);
        }
        .modal-num {
            font-size: 0.6rem;
            color: var(--color-gold);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 2px;
            font-weight: 600;
        }
        .modal-title-primary {
            font-family: 'Noto Serif Telugu', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 2px;
        }
        .modal-title-secondary {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        [data-lang="en"] .modal-title-primary {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
        }
        [data-lang="en"] .modal-title-secondary {
            font-family: 'Noto Serif Telugu', serif;
            font-size: 0.95rem;
        }
        .modal-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all var(--transition-smooth);
            backdrop-filter: var(--glass-blur);
        }
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        /* ═══ VIDEO PLAYER ═══ */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-wrap {
            border-bottom: 1px solid var(--glass-border);
        }

        /* ═══ MODAL BODY — Improved Lyrics ═══ */
        .modal-body {
            overflow-y: auto;
            padding: 20px 24px;
            flex: 1;
        }
        .modal-body::-webkit-scrollbar {
            width: 3px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: var(--color-purple);
            border-radius: 3px;
        }

        .trans-toggle {
            font-size: 0.65rem;
            color: var(--color-purple-light);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            margin-bottom: 14px;
            text-decoration: underline;
            text-underline-offset: 3px;
            font-family: 'Inter', sans-serif;
            transition: color var(--transition-smooth);
        }
        .trans-toggle:hover {
            color: var(--color-gold);
        }

        .section-block.chorus-block {
            margin-bottom: 24px;
            background: rgba(212, 168, 67, 0.06);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            border: 1px solid rgba(212, 168, 67, 0.12);
        }
        .section-label.chorus {
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-gold);
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label.chorus::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--color-gold), transparent);
            opacity: 0.3;
        }

        .section-block.verse-block {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .verse-num-badge {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(124, 58, 237, 0.12);
            border: 1.5px solid var(--color-purple-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--color-purple-light);
            margin-top: 2px;
            font-family: 'Inter', sans-serif;
        }
        .verse-content {
            flex: 1;
            min-width: 0;
        }
        .lyric-lines {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .lyric-line {
            padding: 2px 0;
        }
        .line-tel {
            font-family: 'Noto Serif Telugu', serif;
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.6;
        }
        .line-trans {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-top: 1px;
            font-style: italic;
            padding-left: 6px;
            border-left: 2px solid rgba(124, 58, 237, 0.15);
        }
        .refrain-line .line-tel {
            color: var(--color-gold-light);
            font-weight: 600;
            text-shadow: 0 0 20px var(--color-gold-glow);
        }
        .refrain-line .line-trans {
            color: var(--color-gold);
            border-left-color: rgba(212, 168, 67, 0.3);
        }

        [data-lang="en"] .line-tel {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        [data-lang="en"] .line-trans {
            font-family: 'Noto Serif Telugu', serif;
            font-size: 0.85rem;
            color: var(--text-primary);
            font-style: normal;
            border-left-color: rgba(168, 85, 247, 0.2);
        }

        /* Refrain Box (legacy) */
        .refrain-box {
            background: rgba(212, 168, 67, 0.06);
            border: 1px solid rgba(212, 168, 67, 0.12);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
        }
        .refrain-label {
            font-size: 0.55rem;
            color: var(--color-gold);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .refrain-tel {
            font-family: 'Noto Serif Telugu', serif;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        .refrain-trans {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ═══ MODAL ACTIONS ═══ */
        .modal-actions {
            padding: 14px 24px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .btn-audio {
            background: linear-gradient(135deg, var(--color-purple), var(--color-purple-light));
            color: #fff;
            box-shadow: 0 2px 16px var(--color-purple-glow);
        }
        .btn-audio:hover {
            box-shadow: 0 4px 32px var(--color-purple-glow);
            transform: translateY(-2px) scale(1.02);
        }
        .btn-video {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            backdrop-filter: var(--glass-blur);
        }
        .btn-video:hover {
            border-color: var(--color-gold);
            color: var(--color-gold);
            transform: translateY(-2px);
        }
        .btn-toggle-video {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.7rem;
            backdrop-filter: var(--glass-blur);
        }
        .btn-toggle-video.active {
            border-color: var(--color-purple);
            color: var(--color-purple-light);
            background: rgba(124, 58, 237, 0.1);
        }
        .btn-toggle-video:hover {
            transform: translateY(-2px);
        }

        /* ═══ EMPTY STATE ═══ */
        .empty {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* ═══ SCROLLBAR ═══ */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-purple);
            border-radius: 3px;
        }

        /* ═══ RUNE FLASH ═══ */
        .rune-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }
        .rune-flash.flash {
            animation: runeFlash 0.6s ease forwards;
        }
        @keyframes runeFlash {
            0% {
                opacity: 0;
            }
            15% {
                opacity: 0.2;
            }
            100% {
                opacity: 0;
            }
        }

        /* ═══ PAGE TRANSITION ═══ */
        .page-wipe {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--color-purple), var(--color-teal));
            z-index: 1000;
            transform: scaleX(0);
            transform-origin: left;
            pointer-events: none;
        }
        .page-wipe.in {
            animation: wipeIn 0.3s ease forwards;
        }
        .page-wipe.out {
            animation: wipeOut 0.3s ease 0.3s forwards;
        }
        @keyframes wipeIn {
            to {
                transform: scaleX(1);
            }
        }
        @keyframes wipeOut {
            from {
                transform: scaleX(1);
                transform-origin: right;
            }
            to {
                transform: scaleX(0);
                transform-origin: right;
            }
        }

        /* ═══ RESPONSIVE ═══ */
        @media(max-width:768px) {
            .songs-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 12px;
            }
            .header-center {
                display: none;
            }
            .stat-pill {
                display: none;
            }
            .hero {
                padding: 32px 16px 28px;
            }
            .modal {
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                max-height: 92vh;
                align-self: flex-end;
            }
            .modal-overlay {
                align-items: flex-end;
                padding: 0;
            }
            .np-progress-wrap {
                display: none;
            }
            .section-block.verse-block {
                gap: 10px;
            }
            .verse-num-badge {
                width: 24px;
                height: 24px;
                font-size: 0.55rem;
            }
            .line-tel {
                font-size: 0.85rem;
            }
            .now-playing {
                padding: 8px 14px;
                gap: 8px;
            }
            .np-btn.play {
                width: 36px;
                height: 36px;
                font-size: 0.8rem;
            }
            .filter-btn {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
            .sort-select {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
            .letter-btn {
                min-width: 28px;
                height: 28px;
                font-size: 0.65rem;
            }
            .song-title-primary {
                font-size: 0.95rem;
            }
        }

        @media(max-width:480px) {
            .songs-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .logo-text {
                font-size: 0.85rem;
            }
            .logo-img {
                width: 32px;
                height: 32px;
            }
            .hero-title {
                font-size: 1.6rem;
            }
            .hero-subtitle {
                font-size: 0.95rem;
            }
            .hero-logo-img {
                width: 56px;
                height: 56px;
            }
            .modal-title-primary {
                font-size: 1.1rem;
            }
            .modal-header {
                padding: 16px 18px 12px;
            }
            .modal-body {
                padding: 14px 16px;
            }
            .modal-actions {
                padding: 10px 16px;
            }
            .btn {
                font-size: 0.7rem;
                padding: 6px 12px;
            }
            .controls {
                padding: 10px 14px 4px;
            }
            #search {
                padding: 10px 12px 10px 38px;
                font-size: 0.8rem;
            }
            .filter-row {
                gap: 4px;
            }
            .song-card {
                padding: 14px 16px;
            }
        }

        /* ═══ LIGHT THEME OVERRIDES ═══ */
        [data-theme="light"] .song-card {
            background: rgba(255, 255, 255, 0.5);
        }
        [data-theme="light"] .song-card:hover {
            background: rgba(255, 255, 255, 0.7);
        }
        [data-theme="light"] #search {
            background: rgba(255, 255, 255, 0.5);
        }
        [data-theme="light"] .filter-btn {
            background: rgba(255, 255, 255, 0.4);
        }
        [data-theme="light"] .letter-btn {
            background: rgba(255, 255, 255, 0.4);
        }
        [data-theme="light"] .modal {
            background: rgba(255, 255, 255, 0.85);
        }
        [data-theme="light"] .modal-header {
            background: linear-gradient(180deg, rgba(124, 58, 237, 0.05), transparent);
        }
        [data-theme="light"] .now-playing {
            background: rgba(255, 255, 255, 0.85);
        }
        [data-theme="light"] .hero {
            background: radial-gradient(ellipse 80% 60% at 50% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
        }
        [data-theme="light"] .bg-glow .orb {
            opacity: 0.1;
        }
        [data-theme="light"] .lang-toggle {
            background: rgba(255, 255, 255, 0.4);
        }
        [data-theme="light"] .np-btn {
            background: rgba(255, 255, 255, 0.5);
        }
        [data-theme="light"] .np-btn.play {
            background: linear-gradient(135deg, var(--color-purple), var(--color-purple-light));
            color: #fff;
        }
        [data-theme="light"] .btn-video {
            background: rgba(255, 255, 255, 0.5);
        }
        [data-theme="light"] .btn-toggle-video {
            background: rgba(255, 255, 255, 0.5);
        }
        [data-theme="light"] .stat-pill {
            background: rgba(255, 255, 255, 0.4);
        }
        [data-theme="light"] .theme-btn {
            background: rgba(255, 255, 255, 0.4);
        }
        [data-theme="light"] .song-card.is-new::after {
            border-color: var(--color-purple);
        }
    </style>
</head>
<body>

    <!-- Background Glow Orbs -->
    <div class="bg-glow">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Particle Canvas -->
    <canvas id="particles"></canvas>

    <!-- Magic Circle Decoration -->
    <svg class="magic-circle" style="width:600px;height:600px;left:calc(50% - 300px);top:calc(50% - 300px)" viewBox="0 0 600 600">
        <circle cx="300" cy="300" r="280" stroke="#7c3aed" stroke-width="0.5" fill="none" stroke-dasharray="8 4"/>
        <circle cx="300" cy="300" r="240" stroke="#d4a843" stroke-width="0.3" fill="none" stroke-dasharray="4 8"/>
        <polygon points="300,40 540,440 60,440" stroke="#7c3aed" stroke-width="0.4" fill="none"/>
        <polygon points="300,560 60,160 540,160" stroke="#d4a843" stroke-width="0.3" fill="none"/>
        <circle cx="300" cy="300" r="8" fill="#7c3aed" opacity="0.3"/>
    </svg>

    <!-- Page Wipe & Flash -->
    <div class="page-wipe" id="page-wipe"></div>
    <div class="rune-flash" id="rune-flash">
        <svg width="300" height="300" viewBox="0 0 300 300" fill="none">
            <polygon points="150,10 280,230 20,230" stroke="#7c3aed" stroke-width="2" fill="none"/>
            <circle cx="150" cy="150" r="100" stroke="#d4a843" stroke-width="1" fill="none"/>

    <!-- ===== SONGS GRID ===== -->
    <div class="songs-grid" id="songs-grid"></div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <div class="modal-num" id="modal-num"></div>

    <!-- ===== NOW PLAYING BAR ===== -->
    <div class="now-playing" id="now-playing">
        <div class="np-info">
            <div class="np-title" id="np-title">—</div>
            <div class="np-sub" id="np-sub">Hosanna Ministers</div>

            <button class="np-btn" onclick="seekAudio(-10)">⟨10</button>
            <button class="np-btn play" id="np-play-btn" onclick="togglePlay()">▶</button>
            <button class="np-btn" onclick="seekAudio(10)">10⟩</button>
        </div>
        <div class="np-progress-wrap">
            <div class="np-progress" id="np-progress" onclick="onProgressClick(event)">
                <div class="np-progress-fill" id="np-progress-fill" style="width:0%"></div>
            </div>
            <div class="np-time"><span id="np-current">0:00</span><span id="np-total">0:00</span></div>
        </div>
        <span class="np-close" onclick="closeAudio()">✕</span>
    </div>
    <audio id="audio-player"></audio>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ============================================================
        // 1. FIREBASE CONFIG — REPLACE WITH YOUR OWN
        // ============================================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "arpana-hosanna.firebaseapp.com",
            databaseURL: "https://arpana-hosanna-default-rtdb.firebaseio.com",
            projectId: "arpana-hosanna",
            storageBucket: "arpana-hosanna.firebasestorage.app",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ============================================================
        // 2. STATE
        // ============================================================
        let SONGS = [];
        let lang = 'te';
        let filter = 'all';
        let sortBy = 'id';
        let query = '';
        let activeLetter = null;
        let currentSongId = null;
        let showTrans = true;
        let videoShown = false;
        const audioEl = document.getElementById('audio-player');
        const nowPlaying = document.getElementById('now-playing');

        // ============================================================
        // 3. HELPERS
        // ============================================================
        function padId(n) { return String(n).padStart(3, '0'); }

        function ytId(url) {
            if (!url) return null;
            const m = url.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);
            return m ? m[1] : null;
        }

        function fmtTime(s) { s = Math.floor(s || 0); return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + s % 60; }

        // ============================================================
        // 4. LANG SWITCH
        // ============================================================
        function setLang(l) {
            lang = l;
            document.documentElement.dataset.lang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
            document.getElementById('letter-filter-title').textContent = l === 'te' ? 'Filter by Telugu Letter' :
                'Filter by English Letter';
            renderLetters();
            renderGrid();
            runeFlash();
        }

        // ============================================================
        // 5. THEME
        // ============================================================
        function toggleTheme() {
            const isDark = document.documentElement.dataset.theme === 'dark';
            document.documentElement.dataset.theme = isDark ? 'light' : 'dark';
            document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
        }

        // ============================================================
        // 6. PARTICLE SYSTEM
        // ============================================================
        (function initParticles() {
            const c = document.getElementById('particles');
            const ctx = c.getContext('2d');
            let w, h, particles = [];

            function resize() { w = c.width = window.innerWidth;
                h = c.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() { this.reset();
                    this.y = Math.random() * h; }
                reset() { this.x = Math.random() * w;
                    this.y = h + 10;
                    this.vy = -(0.15 + Math.random() * 0.4);
                    this.vx = (Math.random() - 0.5) * 0.2;
                    this.r = Math.random() * 1.2 + 0.5;
                    this.life = 1;
                    this.type = Math.random() > 0.8 ? 'cross' : 'dot'; }
                draw() {
                    ctx.globalAlpha = this.life * 0.5;
                    const colors = ['#7c3aed', '#d4a843', '#14b8a6', '#ec4899'];
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    if (this.type === 'cross') {
                        ctx.strokeStyle = ctx.fillStyle;
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(this.x - 2, this.y);
                        ctx.lineTo(this.x + 2, this.y);
                        ctx.moveTo(this.x, this.y - 2);
                        ctx.lineTo(this.x, this.y + 2);
                        ctx.stroke();
                    } else {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                update() { this.x += this.vx;
                    this.y += this.vy;
                    this.life -= 0.003; if (this.life <= 0) this.reset(); }
            }
            for (let i = 0; i < 50; i++) particles.push(new Particle());

            function loop() { ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update();
                    p.draw(); });
                requestAnimationFrame(loop); }
            loop();
        })();

        // ============================================================
        // 7. RUNE FLASH
        // ============================================================
        function runeFlash() {
            const el = document.getElementById('rune-flash');
            el.classList.remove('flash');
            void el.offsetWidth;
            el.classList.add('flash');
        }

        // ============================================================
        // 8. LETTER FILTER
        // ============================================================
        function renderLetters() {
            const songs = getBaseSongs();
            const usedLetters = new Set();
            songs.forEach(s => {
                const title = lang === 'te' ? s.tel : s.eng;
                if (title && title[0]) usedLetters.add(title[0].toUpperCase());
            });
            const allLetters = [...new Set(SONGS.map(s => {
                const t = lang === 'te' ? s.tel : s.eng;
                return t && t[0] ? t[0].toUpperCase() : null;
            }).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'te'));

            const row = document.getElementById('letters-row');
            row.innerHTML = allLetters.map(l =>
                `<button class="letter-btn${activeLetter===l?' active':''}${!usedLetters.has(l)?' disabled':''}" onclick="setLetter('${l}')">${l}</button>`
            ).join('');
        }

        function setLetter(l) {
            activeLetter = activeLetter === l ? null : l;
            document.getElementById('letter-clear-btn').classList.toggle('visible', !!activeLetter);
            renderLetters();
            renderGrid();
        }

        function clearLetter() { activeLetter = null;
            document.getElementById('letter-clear-btn').classList.remove('visible');
            renderLetters();
            renderGrid(); }

        // ============================================================
        // 9. FILTERING
        // ============================================================
        function getBaseSongs() {
            let s = SONGS;
            if (filter === 'new') s = s.filter(x => x.new);
            else if (filter === 'praise') s = s.filter(x => x.cat && x.cat.includes('Praise'));
            else if (filter === 'goodfriday') s = s.filter(x => x.cat && x.cat.toLowerCase().includes('good friday'));
            else if (filter === 'secondcoming') s = s.filter(x => x.cat && x.cat.includes('Second Coming'));
            else if (filter === 'prayer') s = s.filter(x => x.cat && x.cat.toLowerCase().includes('prayer'));
            return s;
        }

        function filteredSongs() {
            let s = getBaseSongs();
            if (activeLetter) {
                s = s.filter(x => {
                    const t = lang === 'te' ? x.tel : x.eng;
                    return t && t[0].toUpperCase() === activeLetter;
                });
            }
            if (query.trim()) {
                const q = query.trim().toLowerCase();
                s = s.filter(x => x.tel.toLowerCase().includes(q) || x.eng.toLowerCase().includes(q) || (x.refrain &&
                    x.refrain.transliteration && x.refrain.transliteration.toLowerCase().includes(q)));
            }
            if (sortBy === 'primary') s = [...s].sort((a, b) => (lang === 'te' ? a.tel : a.eng).localeCompare(lang ===
                'te' ? b.tel : b.eng));
            else if (sortBy === 'secondary') s = [...s].sort((a, b) => (lang === 'te' ? a.eng : a.tel).localeCompare(lang ===
                'te' ? b.eng : b.tel));
            else s = [...s].sort((a, b) => a.id - b.id);
            return s;
        }

        // ============================================================
        // 10. RENDER GRID
        // ============================================================
        function renderGrid() {
            const songs = filteredSongs();
            const grid = document.getElementById('songs-grid');
            document.getElementById('results-count').textContent = songs.length;
            if (!SONGS.length) {
                grid.innerHTML =
                    '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🕊</div><div>Loading songs from Firebase…</div></div>';
                return;
            }
            if (!songs.length) {
                grid.innerHTML =
                    '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🕊</div><div>No songs found.</div></div>';
                return;
            }
            grid.innerHTML = songs.map((s, i) => {
                const primaryTitle = lang === 'te' ? s.tel : s.eng;
                const secondaryTitle = lang === 'te' ? s.eng : s.tel;
                const preview = lang === 'te' ?
                    (s.sections && s.sections[0] && s.sections[0].telugu && s.sections[0].telugu[0]) || '' :
                    (s.sections && s.sections[0] && s.sections[0].transliteration && s.sections[0].transliteration[
                    0]) || '';
                const audioBtn = s.audio ?
                    `<a class="icon-btn" href="#" title="Play" onclick="event.preventDefault();event.stopPropagation();playAudio(${s.id})"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 10,6 2,11"/></svg></a>` :
                    '';
                const videoBtn = s.video ?
                    `<a class="icon-btn" href="${s.video}" target="_blank" title="YouTube" onclick="event.stopPropagation()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="0.5" y="1.5" width="11" height="9" rx="1.5"/><polygon points="4.5,3.5 8.5,6 4.5,8.5" fill="currentColor" stroke="none"/></svg></a>` :
                    '';
                return `<div class="song-card${s.new?' is-new':''}" onclick="openModal(${s.id})" style="animation-delay:${Math.min(i,30)*0.03}s">
                        <div class="song-num">#${padId(s.id)}</div>
                        <div class="song-title-primary">${primaryTitle}</div>
                        <div class="song-title-secondary">${secondaryTitle}</div>
                        ${preview?`<div class="song-preview">${preview}</div>`:''}
                        <div class="song-meta">
                            ${s.new?'<span class="tag tag-new">New</span>':''}
                            ${s.scale?`<span class="tag tag-scale">${s.scale}</span>`:''}
                            <div class="song-links">${audioBtn}${videoBtn}</div>
                        </div>
                    </div>`;
            }).join('');

            grid.querySelectorAll('.song-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const r = card.getBoundingClientRect();
                    card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
                    card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
                });
            });
        }

        // ============================================================
        // 11. AUDIO PLAYER
        // ============================================================
        function playAudio(id) {
            const song = SONGS.find(s => s.id === id);
            if (!song || !song.audio) return;
            currentSongId = id;
            const primaryTitle = lang === 'te' ? song.tel : song.eng;
            document.getElementById('np-title').textContent = primaryTitle;
            document.getElementById('np-sub').textContent = song.scale ? `Key: ${song.scale}` : 'Hosanna Ministers';
            audioEl.src = song.audio;
            audioEl.play();
            nowPlaying.classList.add('visible');
            document.getElementById('np-play-btn').textContent = '⏸';
            runeFlash();
        }

        function togglePlay() {
            if (audioEl.paused) { audioEl.play();
                document.getElementById('np-play-btn').textContent = '⏸'; } else { audioEl.pause();
                document.getElementById('np-play-btn').textContent = '▶'; }
        }

        function seekAudio(s) { audioEl.currentTime = Math.max(0, audioEl.currentTime + s); }

        function closeAudio() { audioEl.pause();
            nowPlaying.classList.remove('visible'); }

        audioEl.addEventListener('timeupdate', () => {
            const pct = audioEl.duration ? audioEl.currentTime / audioEl.duration * 100 : 0;
            document.getElementById('np-progress-fill').style.width = pct + '%';
            document.getElementById('np-current').textContent = fmtTime(audioEl.currentTime);
            document.getElementById('np-total').textContent = fmtTime(audioEl.duration);
        });
        audioEl.addEventListener('ended', () => { document.getElementById('np-play-btn').textContent = '▶'; });

        function onProgressClick(e) {
            const r = document.getElementById('np-progress').getBoundingClientRect();
            audioEl.currentTime = ((e.clientX - r.left) / r.width) * audioEl.duration;
        }

        // ============================================================
        // 12. MODAL
        // ============================================================
        function openModal(id) {
            const song = SONGS.find(s => s.id === id);
            if (!song) return;
            currentSongId = id;
            videoShown = false;
            document.getElementById('modal-num').textContent = 'Song #' + padId(id);
            const primary = lang === 'te' ? song.tel : song.eng;
            const secondary = lang === 'te' ? song.eng : song.tel;
            document.getElementById('modal-title-primary').textContent = primary;
            document.getElementById('modal-title-secondary').textContent = secondary;
            const tags = [];
            if (song.new) tags.push('<span class="tag tag-new">New Song</span>');
            if (song.scale) tags.push(`<span class="tag tag-scale">${song.scale}</span>`);
            if (song.cat) tags.push(`<span class="tag tag-cat">${song.cat}</span>`);
            document.getElementById('modal-meta').innerHTML = tags.join('');
            document.getElementById('video-wrap').style.display = 'none';
            document.getElementById('yt-iframe').src = '';
            renderModalBody(song);
            const acts = [];
            if (song.audio) acts.push(`<button class="btn btn-audio" onclick="playAudio(${id})">▶ Play Audio</button>`);
            if (song.video) {
                acts.push(`<a class="btn btn-video" href="${song.video}" target="_blank">▶ YouTube</a>`);
                const vid = ytId(song.video);
                if (vid) acts.push(
                    `<button class="btn btn-toggle-video" id="toggle-video-btn" onclick="toggleVideo('${vid}')">📺 Embed Video</button>`
                    );
            }
            document.getElementById('modal-actions').innerHTML = acts.join('');
            document.getElementById('modal-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
            runeFlash();
        }

        function toggleVideo(vid) {
            videoShown = !videoShown;
            const wrap = document.getElementById('video-wrap');
            const btn = document.getElementById('toggle-video-btn');
            if (videoShown) {
                document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                wrap.style.display = 'block';
                if (btn) btn.classList.add('active');
                if (btn) btn.textContent = '✕ Hide Video';
            } else {
                document.getElementById('yt-iframe').src = '';
                wrap.style.display = 'none';
                if (btn) btn.classList.remove('active');
                if (btn) btn.textContent = '📺 Embed Video';
            }
        }

        function renderModalBody(song) {
            let html = '';
            html += `<button class="trans-toggle" onclick="toggleTrans()">${showTrans?'Hide':'Show'} transliteration</button>`;
            if (song.refrain && song.refrain.telugu) {
                const rtel = lang === 'te' ? song.refrain.telugu : song.refrain.transliteration || song.refrain.telugu;
                const rsub = lang === 'te' ? (song.refrain.transliteration || '') : (song.refrain.telugu || '');
                html +=
                    `<div class="refrain-box"><div class="refrain-label">Refrain</div><div class="refrain-tel">${rtel}</div>${showTrans&&rsub?`<div class="refrain-trans">${rsub}</div>`:''}</div>`;
            }
            const sects = (song.sections || []).slice().sort((a, b) => {
                const o = ['chorus', 'verse', 'bridge'];
                const ai = o.indexOf(a.sectionType),
                    bi = o.indexOf(b.sectionType);
                return ai !== bi ? ai - bi : a.number - b.number;
            });
            let vNum = 0,
                chShown = false;
            for (const sec of sects) {
                const t = sec.sectionType || 'verse';
                let label = '';
                let blockClass = 'section-block';
                if (t === 'chorus') { if (chShown) continue;
                    chShown = true;
                    label = 'Chorus';
                    blockClass += ' chorus-block'; } else if (t === 'verse') { vNum++;
                    label = 'Verse ' + vNum;
                    blockClass += ' verse-block'; } else { label = 'Bridge';
                    blockClass += ' verse-block'; }
                const telLines = sec.telugu || [];
                const transLines = sec.transliteration || [];
                const lines = telLines.map((line, i) => {
                    const trans = transLines[i] || '';
                    const primary = lang === 'te' ? line : trans;
                    const secondary = lang === 'te' ? trans : line;
                    const isRefrain = /^[|॥]/.test(line) || /^[|॥]/.test(trans);
                    return `<div class="lyric-line${isRefrain?' refrain-line':''}"><div class="line-tel">${primary||line}</div>${showTrans&&secondary?`<div class="line-trans">${secondary}</div>`:''}</div>`;
                }).join('');

                if (t === 'chorus') {
                    html += `<div class="${blockClass}">
                                <div class="section-label chorus">${label}</div>
                                <div class="lyric-lines">${lines}</div>
                            </div>`;
                } else {
                    html += `<div class="${blockClass}">
                                <div class="verse-num-badge">${vNum}</div>
                                <div class="verse-content">
                                    <div class="lyric-lines">${lines}</div>
                                </div>
                            </div>`;
                }
            }
            document.getElementById('modal-body').innerHTML = html;
        }

        function toggleTrans() {
            showTrans = !showTrans;
            const song = SONGS.find(s => s.id === currentSongId);
            if (song) renderModalBody(song);
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('open');
            document.body.style.overflow = '';
            document.getElementById('video-wrap').style.display = 'none';
            document.getElementById('yt-iframe').src = '';
            videoShown = false;
        }

        // ============================================================
        // 13. FIREBASE DATA LOADING
        // ============================================================
        function loadSongsFromFirebase() {
            const loadingIndicator = document.getElementById('loading-indicator');
            loadingIndicator.classList.add('active');
            const songsRef = database.ref('songs');

            songsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const rawSongs = Object.values(data);
                    SONGS = rawSongs.map((raw) => {
                        const id = raw.id || (rawSongs.indexOf(raw) + 1);
                        const titleTelugu = raw.title?.telugu || '';
                        const titleEnglish = raw.title?.english || '';
                        const meta = raw.metadata || {};
                        return {
                            id: id,
                            tel: titleTelugu,
                            eng: titleEnglish,
                            cat: meta.category || '',
                            scale: meta.scale || '',
                            new: meta.isNewSong || false,
                            audio: meta.audioLink || '',
                            video: meta.videoLink || '',
                            refrain: {
                                telugu: meta.refrain?.telugu || '',
                                transliteration: meta.refrain?.transliteration || ''
                            },
                            sections: (raw.sections || []).map(sec => ({
                                sectionType: sec.sectionType || 'verse',
                                number: sec.number || 1,
                                telugu: sec.telugu || [],
                                transliteration: sec.transliteration || []
                            }))
                        };
                    });
                    console.log('✅ Loaded', SONGS.length, 'songs');
                    updateUI();
                    loadingIndicator.classList.remove('active');
                    try { localStorage.setItem('songsCache', JSON.stringify(SONGS)); } catch(e) {}
                    document.getElementById('hero-count').textContent = SONGS.length;
                } else {
                    loadFromCache();
                }
            }, (error) => {
                console.error('Firebase error:', error);
                loadFromCache();
                loadingIndicator.classList.remove('active');
            });
        }

        function loadFromCache() {
            try {
                const cached = localStorage.getItem('songsCache');
                if (cached) {
                    SONGS = JSON.parse(cached);
                    updateUI();
                    document.getElementById('loading-indicator').classList.remove('active');
                    document.getElementById('hero-count').textContent = SONGS.length;
                } else {
                    document.getElementById('loading-indicator').classList.remove('active');
                    document.getElementById('hero-count').textContent = '0';
                    renderGrid();
                }
            } catch (e) {
                document.getElementById('loading-indicator').classList.remove('active');
                document.getElementById('hero-count').textContent = '0';
                renderGrid();
            }
        }

        function updateUI() {
            document.getElementById('stat-count').textContent = SONGS.length;
            document.getElementById('hero-count').textContent = SONGS.length;
            renderLetters();
            renderGrid();
        }

        // ============================================================
        // 14. EVENTS & INIT
        // ============================================================
        document.getElementById('search').addEventListener('input', e => { query = e.target.value;
            renderGrid();
            renderLetters(); });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filter = btn.dataset.filter;
                activeLetter = null;
                document.getElementById('letter-clear-btn').classList.remove('visible');
                renderLetters();
                renderGrid();
            });
        });
        document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value;
            renderGrid(); });
        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById(
                'modal-overlay')) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // ============================================================
        // 15. START
        // ============================================================
        document.documentElement.dataset.lang = 'te';
        loadSongsFromFirebase();
    </script>
</body>
</html>
